name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json
          
      - name: Install Backend Dependencies
        run: npm ci

      # Note: 'npm test' is omitted because no tests are currently defined in backend/package.json.
      # You can add tests later and uncomment the following step.
      # - name: Run Backend Tests
      #   run: npm test

  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
          
      - name: Install Frontend Dependencies
        run: npm ci
        
      - name: Run Linter
        run: npm run lint
        
      - name: Build Project
        run: npm run build
